{% extends "base.html" %}

{% block content %}
<section class="mb-6">
    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">🔌 افزودن پنل جدید</h2>
    
    <div class="glass-card p-5">
        <form action="/admin/panels/add" method="POST" class="flex flex-col gap-4">
            <div>
                <label class="text-xs font-bold text-gray-500 block mb-1">نام مستعار سرور:</label>
                <input type="text" name="name" placeholder="مثلا سرور آلمان ۱" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm focus:outline-indigo-500" required>
            </div>
            <div>
                <label class="text-xs font-bold text-gray-500 block mb-1">نوع پنل:</label>
                <select name="panel_type" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm focus:outline-indigo-500">
                    <option value="sanaei">X-UI سنایی (Sanaei)</option>
                    <option value="marzban">مرزبان (Marzban)</option>
                </select>
            </div>
            <div>
                <label class="text-xs font-bold text-gray-500 block mb-1">آدرس کامل API پنل:</label>
                <input type="url" name="api_url" placeholder="http://123.45.67.89:2053" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm focus:outline-indigo-500 ltr text-left" required>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-xs font-bold text-gray-500 block mb-1">نام کاربری پنل:</label>
                    <input type="text" name="username" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm focus:outline-indigo-500 ltr text-left" required>
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 block mb-1">کلمه عبور پنل:</label>
                    <input type="password" name="password" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm focus:outline-indigo-500 ltr text-left" required>
                </div>
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white font-bold p-3 rounded-xl shadow-md hover:bg-indigo-700 transition">اتصال واقعی و ذخیره سرور</button>
        </form>
    </div>
</section>

<section>
    <h3 class="text-md font-bold mb-3 text-gray-500">🖥️ پنل‌های متصل شده</h3>
    <div class="flex flex-col gap-3">
        {% for panel in panels %}
        <div class="glass-card p-4 flex justify-between items-center">
            <div>
                <p class="font-bold text-sm text-gray-800">{{ panel.name }}</p>
                <p class="text-xs text-gray-400 mt-1 ltr text-right">{{ panel.api_url }}</p>
                <span class="inline-block bg-indigo-50 text-indigo-600 text-[10px] font-bold px-2 py-0.5 rounded-md mt-1">{{ panel.panel_type.upper() }}</span>
            </div>
            <a href="/admin/panels/delete/{{ panel.id }}" class="w-9 h-9 bg-red-50 text-red-500 rounded-xl flex items-center justify-center text-sm shadow-xs hover:bg-red-100">🗑️</a>
        </div>
        {% else %}
        <p class="text-xs text-gray-400 text-center py-4">هیچ سرور یا پنلی هنوز اضافه نشده است.</p>
        {% endfor %}
    </div>
</section>
{% endblock %}
