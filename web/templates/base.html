<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZarVPN - داشبورد مدیریت</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://v1.fontapi.ir/css/Vazir');
        body {
            font-family: 'Vazir', sans-serif;
            background-color: #f0f2f5;
        }
        /* استایل ملایم نیومورفیسم و شیشه‌ای شبیه به عکس‌ها */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        .neo-btn {
            border-radius: 16px;
            box-shadow: 3px 3px 6px #d1d9e6, -3px -3px 6px #ffffff;
            transition: all 0.2s ease;
        }
        .neo-btn:active {
            box-shadow: inset 2px 2px 5px #d1d9e6, inset -2px -2px 5px #ffffff;
        }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col pb-20">

    <header class="w-full max-w-md mx-auto mt-4 px-4">
        <div class="glass-card p-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold">Z</div>
                <div>
                    <h1 class="text-lg font-bold">Zarvpn</h1>
                    <span class="text-xs text-indigo-600 font-medium">پنل مدیریت عمومی</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-gray-500 shadow-xs">🌙</button>
                <button class="w-10 h-10 bg-red-50 rounded-full flex items-center justify-center text-red-500 shadow-xs">⚙️</button>
            </div>
        </div>
    </header>

    <main class="w-full max-w-md mx-auto px-4 mt-6 flex-grow">
        {% block content %}{% endblock %}
    </main>

    <nav class="fixed bottom-4 left-0 right-0 w-full max-w-md mx-auto px-4 z-50">
        <div class="glass-card py-3 px-6 flex justify-between items-center text-gray-400">
            <a href="/admin/settings" class="flex flex-col items-center gap-1 hover:text-indigo-600">
                <span class="text-xl">%</span>
                <span class="text-[10px]">تنظیمات</span>
            </a>
            <a href="/admin/gateways" class="flex flex-col items-center gap-1 hover:text-indigo-600">
                <span class="text-xl">💳</span>
                <span class="text-[10px]">درگاه‌ها</span>
            </a>
            <a href="/admin" class="flex flex-col items-center gap-1 text-indigo-600 bg-indigo-50 p-2 rounded-2xl">
                <span class="text-xl">🏠</span>
                <span class="text-[10px]">اصلی</span>
            </a>
            <a href="/admin/panels" class="flex flex-col items-center gap-1 hover:text-indigo-600">
                <span class="text-xl">🤖</span>
                <span class="text-[10px]">پنل‌ها</span>
            </a>
            <a href="/admin/users" class="flex flex-col items-center gap-1 hover:text-indigo-600">
                <span class="text-xl">👥</span>
                <span class="text-[10px]">کاربران</span>
            </a>
        </div>
    </nav>

</body>
</html>
